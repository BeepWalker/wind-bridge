# Prometheus 监控配置
# 在被监控的机器上运行: prometheus --config.file=prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "wind-bridge"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "192.168.1.100:8899"  # Windows Wind API Server
        labels:
          service: "wind-bridge"
          env: "production"

  - job_name: "wind-bridge-dev"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:8899"  # 本地开发/Mock
        labels:
          service: "wind-bridge"
          env: "development"
